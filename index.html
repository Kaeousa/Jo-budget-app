  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #eaf6f4;
      --surface:    #ffffff;
      --navy:       #074b90;
      --primary:    #3fd2c7;
      --primary-2:  #93dcfc;
      --soft:       #3a6080;
      --softer:     #7fa8c0;
      --income-col: #10b981;
      --income-bg:  #d1fae5;
      --expense-col:#f43f5e;
      --expense-bg: #ffe4e6;
      --border:     #c8e8e5;
      --shadow-sm:  0 1px 3px rgba(7,75,144,0.08), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 16px rgba(7,75,144,0.12), 0 2px 6px rgba(0,0,0,0.06);
      --shadow-lg:  0 12px 32px rgba(7,75,144,0.18), 0 4px 12px rgba(0,0,0,0.08);
      --radius-sm:  10px;
      --radius-md:  16px;
      --radius-lg:  22px;
      --radius-xl:  28px;
    }

    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }
    html { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    body {
      font-family: 'Prompt', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 0 0 108px;
    }

    .book {
      width: 100%;
      max-width: 430px;
      padding: 16px 14px 0;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(145deg, #074b90 0%, #1a7fa8 55%, #3fd2c7 100%);
      border-radius: var(--radius-xl);
      padding: 20px 20px 36px;
      color: #fff;
      position: relative;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 40px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .hero-top {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,0.65);
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    .hero-top svg { opacity: .7; }
    .edit-start-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .hero-label { font-size: 11px; opacity: .6; letter-spacing: .5px; margin-bottom: 4px; position: relative; z-index: 1; }
    .hero-balance {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px; font-weight: 700;
      letter-spacing: -0.5px;
      position: relative; z-index: 1;
    }
    .hero-badge {
      position: absolute; right: 18px; bottom: -15px;
      background: #fbbf24; color: var(--navy);
      font-size: 11px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
      box-shadow: 0 4px 12px rgba(251,191,36,0.4);
      letter-spacing: .3px; z-index: 2;
    }
    .edit-start-btn:hover  { background: rgba(255,255,255,0.22); }
    .edit-start-btn:active { transform: scale(.9); }

    /* ── Stat Cards ── */
    .stat-cards {
      display: flex; gap: 10px;
      margin: -14px 2px 6px;
      position: relative; z-index: 2;
    }
    .stat-card {
      flex: 1; background: var(--surface);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 10px;
    }
    .stat-icon {
      width: 38px; height: 38px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.income  { background: var(--income-bg); }
    .stat-icon.expense { background: var(--expense-bg); }
    .stat-lbl { font-size: 10px; color: var(--softer); letter-spacing: .3px; }
    .stat-val { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .stat-val.income  { color: var(--income-col); }
    .stat-val.expense { color: var(--expense-col); }

    /* ── Month Nav ── */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin: 22px 2px 14px;
    }
    .month-nav h2 { font-size: 15px; font-weight: 600; color: var(--navy); }
    .nav-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm); cursor: pointer;
      color: var(--navy); transition: background .15s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--bg); }
    .nav-btn:active:not(:disabled) { transform: scale(.9); background: var(--border); }
    .nav-btn:disabled { opacity: .3; cursor: default; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 6px;
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 5px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1; padding: 8px; border: none; border-radius: var(--radius-sm);
      font-family: 'Prompt', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--soft);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .18s;
    }
    .tab-btn.active { background: var(--navy); color: #fff; box-shadow: 0 2px 8px rgba(7,75,144,0.35); }
    .tab-btn:active:not(.active) { background: var(--border); }

    /* ── Summary Sub-Tabs ── */
    .subtabs {
      display: flex; gap: 8px;
      margin-bottom: 16px;
    }
    .subtab-btn {
      flex: 1; padding: 9px 4px 8px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); min-height: 50px;
      cursor: pointer; background: var(--surface); color: var(--soft);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      transition: all .18s;
    }
    .subtab-btn svg { flex-shrink: 0; opacity: .8; width: 17px; height: 17px; }
    .subtab-lbl { font-family: 'Prompt', sans-serif; font-size: 10px; font-weight: 500; line-height: 1.1; white-space: nowrap; }
    .subtab-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; box-shadow: 0 2px 8px rgba(7,75,144,0.3); }
    .subtab-btn.active svg { opacity: 1; }
    .subtab-btn:active:not(.active) { background: var(--border); }

    /* ── Transaction List ── */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .search-input {
      flex: 1; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-family: 'Prompt', sans-serif;
      font-size: 13px; background: var(--surface); color: var(--navy);
    }
    .search-input:focus { outline: 2px solid var(--primary-2); }
    .cat-filter {
      padding: 10px 8px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-family: 'Prompt', sans-serif;
      font-size: 12px; background: var(--surface); color: var(--navy);
      max-width: 110px;
    }
    .tx-empty { text-align: center; color: var(--softer); padding: 56px 0; font-size: 14px; }
    .tx-empty-icon { margin-bottom: 12px; opacity: .4; }
    .tx-card {
      background: var(--surface); border-radius: var(--radius-md);
      padding: 13px 14px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 11px;
      transition: box-shadow .15s, transform .1s;
    }
    .tx-card:active { transform: scale(.985); box-shadow: none; }
    .tx-cat-icon {
      width: 42px; height: 42px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-info .cat { font-size: 13px; font-weight: 600; color: var(--navy); }
    .tx-info .meta {
      font-size: 11px; color: var(--softer); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tx-right { text-align: right; }
    .tx-amt { font-size: 14px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    .tx-amt.income  { color: var(--income-col); }
    .tx-amt.expense { color: var(--expense-col); }
    .tx-bal { font-size: 10px; color: var(--softer); margin-top: 2px; }
    .tx-del-btn {
      background: none; border: none; padding: 6px;
      color: var(--softer); cursor: pointer;
      border-radius: 8px; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      min-width: 36px; min-height: 36px;
    }
    .tx-del-btn:hover { color: var(--expense-col); background: var(--expense-bg); }
    .tx-edit-btn {
      background: none; border: none; padding: 6px;
      color: var(--softer); cursor: pointer;
      border-radius: 8px; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .tx-edit-btn:hover { color: var(--navy); background: var(--bg); }

    /* ── Summary ── */
    .cat-section { margin-top: 6px; }
    .insight-section { margin-bottom: 18px; }
    .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .insight-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px;
    }
    .insight-lbl { font-size: 11px; color: var(--soft); margin-bottom: 4px; }
    .insight-val { font-size: 16px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--navy); }
    .insight-val.expense { color: var(--expense-col); }
    .insight-val.income  { color: var(--income-col); }
    .insight-sub { font-size: 10.5px; color: var(--softer); margin-top: 3px; }
    .section-title {
      font-size: 11px; font-weight: 600; color: var(--softer);
      text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px;
    }
    .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .cat-row .bar-wrap { flex: 1; background: var(--bg); border-radius: 6px; height: 6px; overflow: hidden; }
    .cat-row .bar-fill { height: 100%; border-radius: 6px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .cat-icon-sm { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cat-row .cat-label { font-size: 12px; color: var(--navy); min-width: 70px; }
    .cat-row .cat-amt { font-size: 12px; font-weight: 700; color: var(--expense-col); min-width: 72px; text-align: right; font-family: 'Space Grotesk', sans-serif; }

    /* ── Monthly Chart ── */
    .chart-section {
      background: var(--surface); border-radius: var(--radius-md);
      padding: 16px; margin-top: 16px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .chart-header .section-title { margin-bottom: 0; }
    .chart-legend { display: flex; gap: 12px; }
    .chart-legend span { font-size: 10px; color: var(--soft); display: flex; align-items: center; gap: 4px; }
    .chart-legend span::before { content:""; display:inline-block; width:8px; height:8px; border-radius:2px; }
    .legend-inc::before { background: var(--income-col); }
    .legend-exp::before { background: var(--expense-col); }
    .chart-area { position: relative; }
    .chart-grid { position: absolute; inset: 0 0 20px 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
    .chart-grid-line { border-top: 1px dashed var(--border); width: 100%; }
    .chart-bars { display: flex; align-items: flex-end; gap: 5px; height: 120px; padding-bottom: 20px; position: relative; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0; height: 100%; justify-content: flex-end; }
    .chart-pair { display: flex; align-items: flex-end; gap: 2px; width: 100%; }
    .chart-bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 2px; transition: height .5s cubic-bezier(.4,0,.2,1); }
    .chart-bar.income  { background: linear-gradient(180deg, #34d399, var(--income-col)); }
    .chart-bar.expense { background: linear-gradient(180deg, #fb7185, var(--expense-col)); }
    .chart-lbl { font-size: 8.5px; color: var(--softer); text-align: center; position: absolute; bottom: 2px; left: 0; right: 0; }

    /* ── FABs ── */
    .fab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px) saturate(1.5);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      display: flex; gap: 10px; z-index: 90;
    }
    .fab {
      flex: 1; height: 44px; border-radius: var(--radius-md); border: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Prompt', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s; letter-spacing: .2px;
    }
    .fab:active { transform: scale(.97); }
    .fab.income-fab  { background: var(--income-col); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.4); }
    .fab.expense-fab { background: var(--expense-col); color: #fff; box-shadow: 0 4px 14px rgba(244,63,94,0.4); }
    .fab.income-fab:hover  { filter: brightness(1.08); }
    .fab.expense-fab:hover { filter: brightness(1.08); }

    /* ── Sheet Modal ── */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      background: var(--surface);
      border-radius: 28px 28px 0 0;
      padding: 8px 20px calc(32px + env(safe-area-inset-bottom));
      width: 100%; max-width: 430px;
      max-height: 92dvh; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    }
    .sheet::-webkit-scrollbar { display: none;
      animation: slideUp .28s cubic-bezier(.32,0,.15,1);
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 10px auto 20px;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .sheet-head h2 { font-size: 17px; font-weight: 700; color: var(--navy); }
    .sheet-close {
      background: var(--bg); border: none; cursor: pointer; color: var(--soft);
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-close:hover  { background: var(--border); }
    .sheet-close:active { transform: scale(.88); }

    .type-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .type-btn {
      flex: 1; padding: 11px; border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; background: var(--bg); color: var(--soft);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
    }
    .type-btn:active { transform: scale(.96); }
    .type-btn.expense.active { background: var(--expense-bg); color: var(--expense-col); border-color: var(--expense-col); }
    .type-btn.income.active  { background: var(--income-bg);  color: var(--income-col);  border-color: var(--income-col); }

    .cat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px;
      animation: gridFade .18s ease;
    }
    @keyframes gridFade { from { opacity: .4; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .amount-field {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border-radius: var(--radius-md);
      padding: 14px 16px; margin-bottom: 20px;
      border: 2px solid var(--border);
    }
    .amount-field .sym { font-size: 22px; font-weight: 700; color: var(--navy); }
    .amount-field input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700; color: var(--navy);
    }

    .field-label { font-size: 11px; font-weight: 600; color: var(--softer); margin-bottom: 8px; letter-spacing: .5px; text-transform: uppercase; }

    .cat-chip {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 9px 4px; border-radius: var(--radius-sm); cursor: pointer;
      background: var(--bg); transition: border-color .15s, background .15s;
      border: 2px solid transparent;
      will-change: transform;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-chip:active { transform: scale(.93); }
    .cat-chip.selected { border-color: var(--primary); background: #e0faf8; }
    .cat-chip .ci { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .cat-chip .cl { font-size: 9.5px; color: var(--navy); text-align: center; line-height: 1.3; font-weight: 500; }

    .text-field {
      width: 100%; padding: 12px 14px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--bg);
      font-family: 'Prompt', sans-serif; font-size: 14px; color: var(--navy);
      outline: none; margin-bottom: 14px; transition: border-color .15s;
    }
    .text-field:focus { border-color: var(--primary); background: #fff; }

    .save-btn {
      width: 100%; padding: 15px; background: var(--navy); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-family: 'Prompt', sans-serif; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      box-shadow: 0 4px 14px rgba(7,75,144,0.4);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
    }
    .save-btn:disabled { opacity: .45; cursor: default; box-shadow: none; }
    .save-btn:not(:disabled):active { transform: scale(.98); }

    /* Toast */
    .toast {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      background: rgba(15,23,42,.88);
      backdrop-filter: blur(8px);
      color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; z-index: 200; opacity: 0;
      transition: opacity .3s; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Loader */
    .loader { display: flex; justify-content: center; align-items: center; height: 240px; flex-direction: column; gap: 14px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Confirm */
    .confirm-box {
      background: var(--surface); border-radius: var(--radius-lg);
      padding: 24px 20px;
      max-width: 320px; width: 88%; margin: auto;
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 200; box-shadow: 0 24px 60px rgba(0,0,0,.22);
    }
    .confirm-box h3 { font-size: 16px; margin-bottom: 8px; color: var(--navy); }
    .confirm-box p  { font-size: 13px; color: var(--soft); margin-bottom: 20px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1; padding: 11px; border: 2px solid var(--border);
      background: var(--bg); border-radius: var(--radius-sm);
      font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; color: var(--navy);
    }
    .btn-del {
      flex: 1; padding: 11px; background: var(--expense-col); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>

function todayISO() { return new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Bangkok" }); }
function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}
function fmt(n) { return Number.isFinite(n) ? n.toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}) : "0.00"; }
function thaiDate(iso) {
  if (!iso) return "";
  const [y,m,d] = iso.split("-").map(Number);
  return `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${y+543}`;
}
function catInfo(key) {
  const cats = allCats();
  return cats.find(c=>c.key===key) || cats.find(c=>c.label===key) || cats[cats.length-1];
}

}

// ⚠️ ใส่ URL ของ Apps Script Web App ที่ deploy แล้ว (ลงท้ายด้วย /exec)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmLXtUEvw8NCrdYvUY4_egoWCEeLriUl6njLCbwf_vXYp5bDk7NU50Z38kp0CCFc1C_A/exec";

function gasCall(fn, ...args) {
  return fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // เลี่ยง CORS preflight
    body: JSON.stringify({ fn, args })
  })
    .then(r => r.json());
}

async function loadData() {
  try {
    const r = await gasCall("getInitialData");
    const txRes = r.transactions, sbRes = r.startingBalance, catRes = r.categories;
    if (txRes.ok) state.transactions = txRes.data.map(t => ({
      ...t, type: t.type === "รายรับ" ? "income" : (t.type === "รายจ่าย" ? "expense" : t.type)
    }));
    if (sbRes.ok) state.startingBalance = sbRes.value;
    if (catRes.ok) applyCategoriesData(catRes.data);
    state.formCategory = EXPENSE_CATEGORIES[0].key;
    state.catColorSeq = allCats().length;
  } catch(e) { showToast("โหลดข้อมูลไม่สำเร็จ"); }
  state.loading = false;
  render();
}

const TYPE_TH = { income: "รายรับ", expense: "รายจ่าย" };

async function saveTransaction() {
  const amt = parseFloat(state.formAmount);
  if (!amt || amt <= 0) { showToast("กรุณาใส่จำนวนเงิน"); return; }
  // อัปเดตปุ่ม in-place แทน renderModals() เพื่อไม่ให้ sheet กระพริบ
  state.saving = true;
  const saveBtn = document.querySelector("#modal-root .save-btn");
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = "กำลังบันทึก..."; }
  try {
    const catLabel = catInfo(state.formCategory).label;
    const txn = {
      id: state.editId,
      date: state.formDate || todayISO(),
      type: TYPE_TH[state.sheetMode] || state.sheetMode,
      category: catLabel,
      amount: Math.round(amt * 100) / 100,
      note: state.formNote.trim(),
    };
    if (state.editId) {
      const res = await gasCall("updateTransaction", txn);
      if (res.ok) {
        const idx = state.transactions.findIndex(t => t.id === state.editId);
        if (idx > -1) state.transactions[idx] = {
          ...state.transactions[idx], date: txn.date, type: state.sheetMode,
          category: state.formCategory, amount: txn.amount, note: txn.note,
        };
        state.sheetOpen = false; state.editId = null;
        // ปิด sheet ก่อน render() เพื่อไม่ให้เห็น sheet กระพริบระหว่าง rebuild
        document.querySelectorAll("#modal-root > .sheet-backdrop").forEach(el => el.remove());
        showToast("✓ แก้ไขแล้ว");
      } else { showToast("แก้ไขไม่สำเร็จ: " + res.error); }
    } else {
      const res = await gasCall("addTransaction", txn);
      if (res.ok) {
        const localTxn = {
          id: res.id, timestamp: new Date().toISOString(),
          date: txn.date, type: state.sheetMode,
          category: state.formCategory,
          amount: txn.amount, note: txn.note,
        };
        state.transactions.push(localTxn);
        state.sheetOpen = false;
        document.querySelectorAll("#modal-root > .sheet-backdrop").forEach(el => el.remove());
        showToast("✓ บันทึกแล้ว");
      } else { showToast("บันทึกไม่สำเร็จ: " + res.error); }
    }
  } catch(e) { showToast("เกิดข้อผิดพลาด: " + (e.message||e)); }
  state.saving = false; render();
}

async function deleteTransaction(id) {
  state.confirmDeleteId = null;
  // ลบ confirm dialog ออกทันที ไม่รอให้ render() ค่อยเคลียร์
  const backdrops = document.querySelectorAll("#modal-root > .sheet-backdrop");
  if (backdrops.length) backdrops[backdrops.length - 1].remove();
  try {
    const res = await gasCall("deleteTransaction", id);
    if (res.ok) {
      state.transactions = state.transactions.filter(t => t.id !== id);
      showToast("ลบแล้ว");
    } else { showToast("ลบไม่สำเร็จ: " + res.error); }
  } catch(e) { showToast("เกิดข้อผิดพลาด"); }
  render();
}

async function saveStartingBalance(val) {
  const sb = Number.isFinite(parseFloat(val)) ? Math.round(parseFloat(val)*100)/100 : 0;
  try {
    await gasCall("setStartingBalance", sb);
    state.startingBalance = sb;
    state.startSheetOpen = false;
    // ปิด sheet ก่อน render() เพื่อไม่ให้กระพริบ
    const el = document.querySelector("#modal-root > .sheet-backdrop");
    if (el) el.remove();
    showToast("บันทึกยอดตั้งต้นแล้ว");
  } catch(e) { showToast("เกิดข้อผิดพลาด"); }
  render();
}

function getMonthData() {
  const now = new Date();
  const vd = new Date(now.getFullYear(), now.getMonth() + state.monthOffset, 1);
  const monthKey = `${vd.getFullYear()}-${String(vd.getMonth()+1).padStart(2,"0")}`;
  const label = `${THAI_MONTHS[vd.getMonth()]} ${vd.getFullYear()+543}`;

  const chrono = [...state.transactions].sort((a,b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    return a.id < b.id ? -1 : 1;
  });

  // คำนวณยอดคงเหลือ ณ แต่ละรายการตามลำดับ "วันที่" (สำหรับความถูกต้องทางบัญชี)
  let running = state.startingBalance;
  const balanceById = {};
  chrono.forEach(t => {
    running += t.type==="income" ? t.amount : -t.amount;
    balanceById[t.id] = running;
  });

  // แสดงผลในหน้ารายการตามลำดับที่ user กด save จริง (state.transactions คือ insertion/save order)
  const withBal = state.transactions.map(t => ({ ...t, balanceAfter: balanceById[t.id] }));

  const inMonth = withBal.filter(t => t.date.slice(0,7) === monthKey);
  const income  = inMonth.reduce((s,t) => t.type==="income"  ? s+t.amount : s, 0);
  const expense = inMonth.reduce((s,t) => t.type==="expense" ? s+t.amount : s, 0);

  const expByCat = {};
  inMonth.forEach(t => { if (t.type==="expense") expByCat[t.category] = (expByCat[t.category]||0) + t.amount; });
  const catBreakdown = Object.entries(expByCat)
    .map(([key,amount]) => ({...catInfo(key), amount}))
    .sort((a,b) => b.amount - a.amount);

  // Build chart data — all months that have data, up to 12 months back
  const chartMonths = [];
  for (let i = 11; i >= 0; i--) {
    const cd = new Date(now.getFullYear(), now.getMonth() + state.monthOffset - i, 1);
    const ck = `${cd.getFullYear()}-${String(cd.getMonth()+1).padStart(2,"0")}`;
    const cl = `${THAI_MONTHS[cd.getMonth()]}`;
    const ci = state.transactions.filter(t => t.date.slice(0,7) === ck);
    const cinc = ci.reduce((s,t) => t.type==="income"  ? s+t.amount : s, 0);
    const cexp = ci.reduce((s,t) => t.type==="expense" ? s+t.amount : s, 0);
    if (cinc > 0 || cexp > 0) chartMonths.push({ label: cl, income: cinc, expense: cexp });
  }

  let items = [...inMonth].reverse();
  if (state.searchQuery.trim()) {
    const q = state.searchQuery.trim().toLowerCase();
    items = items.filter(t => (t.note||"").toLowerCase().includes(q) || catInfo(t.category).label.toLowerCase().includes(q));
  }
  if (state.filterCategory) {
    items = items.filter(t => catInfo(t.category).key === state.filterCategory);
  }
  // ── Insights: avg daily expense, MoM comparison, end-of-month projection ──
  const isCurrentMonth = state.monthOffset === 0;
  const daysInMonth = new Date(vd.getFullYear(), vd.getMonth()+1, 0).getDate();
  const daysElapsed = isCurrentMonth ? now.getDate() : daysInMonth;
  const avgDailyExpense = daysElapsed > 0 ? expense / daysElapsed : 0;
  const avgDailyIncome  = daysElapsed > 0 ? income  / daysElapsed : 0;
  const projectedExpense = isCurrentMonth ? avgDailyExpense * daysInMonth : expense;

  const pd = new Date(vd.getFullYear(), vd.getMonth() - 1, 1);
  const pk = `${pd.getFullYear()}-${String(pd.getMonth()+1).padStart(2,"0")}`;
  const prevItems = state.transactions.filter(t => t.date.slice(0,7) === pk);
  const prevIncome  = prevItems.reduce((s,t) => t.type==="income"  ? s+t.amount : s, 0);
  const prevExpense = prevItems.reduce((s,t) => t.type==="expense" ? s+t.amount : s, 0);
  const expenseChangePct = prevExpense > 0 ? Math.round((expense - prevExpense) / prevExpense * 100) : null;
  const incomeChangePct  = prevIncome  > 0 ? Math.round((income  - prevIncome)  / prevIncome  * 100) : null;

  const insights = {
    isCurrentMonth, daysInMonth, daysElapsed, avgDailyExpense, avgDailyIncome, projectedExpense,
    prevIncome, prevExpense, expenseChangePct, incomeChangePct,
  };

  return { label, income, expense, items, catBreakdown, allBalance: running, chartMonths, insights };
}

    ${renderMonthNav(md)}

}

    <div class="search-bar">
      <input type="text" class="search-input" placeholder="ค้นหาโน้ต/หมวดหมู่..."
        value="${escapeHtml(state.searchQuery)}" oninput="state.searchQuery=this.value;render()" />
      <select class="cat-filter" onchange="state.filterCategory=this.value;render()">
        <option value="">ทุกหมวดหมู่</option>
        ${allCats().map(c => `<option value="${c.key}" ${state.filterCategory===c.key?"selected":""}>${escapeHtml(c.label)}</option>`).join("")}
      </select>
    </div>`;
  if (!md.items.length) return `
    ${searchBar}
    <div class="tx-empty">
      <div class="tx-empty-icon">${SVG.inbox}</div>
      ไม่พบรายการ
    </div>`;
  return `${searchBar}<div class="tx-list">${md.items.map(t => {
    const c = catInfo(t.category);
    const sign = t.type==="income" ? "+" : "-";
    return `
      <div class="tx-card">
        <div class="tx-cat-icon" style="background:${c.bg};color:${c.color}">${c.icon}</div>
        <div class="tx-info">
          <div class="cat">${escapeHtml(c.label)}</div>
          <div class="meta">${thaiDate(t.date)}${t.note ? " · "+escapeHtml(t.note) : ""}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amt ${t.type}">${sign}฿${fmt(t.amount)}</div>
          <div class="tx-bal">฿${fmt(t.balanceAfter)}</div>
        </div>
        <button class="tx-edit-btn" onclick="openEditSheet('${t.id}')">${SVG.pencil}</button>
        <button class="tx-del-btn" onclick="askDelete('${t.id}')">${SVG.trash}</button>
      </div>`;
  }).join("")}</div>`;
}

function renderSummaryBody_insights(md) {
  const ins = md.insights;
  return `
    <div class="insight-section">
      <div class="section-title">ค่าเฉลี่ย</div>
      <div class="insight-grid">
        <div class="insight-card">
          <div class="insight-lbl">เฉลี่ยรายจ่าย/วัน</div>
          <div class="insight-val expense">฿${fmt(ins.avgDailyExpense)}</div>
          <div class="insight-sub">จาก ${ins.daysElapsed} วันที่ผ่านมา</div>
        </div>
        <div class="insight-card">
          <div class="insight-lbl">เฉลี่ยรายรับ/วัน</div>
          <div class="insight-val income">฿${fmt(ins.avgDailyIncome)}</div>
          <div class="insight-sub">จาก ${ins.daysElapsed} วันที่ผ่านมา</div>
        </div>
      </div>
    </div>`;
}

function renderSummaryBody_chart(md) {
  if (md.chartMonths.length < 1) return "";
  const maxVal = Math.max(...md.chartMonths.map(m => Math.max(m.income, m.expense)), 1);
  const BAR_H = 100;
  return `
    <div class="chart-section">
      <div class="chart-header">
        <div class="section-title">รายรับ-รายจ่าย รายเดือน</div>
        <div class="chart-legend">
          <span class="legend-inc">รายรับ</span>
          <span class="legend-exp">รายจ่าย</span>
        </div>
      </div>
      <div class="chart-area">
        <div class="chart-grid">
          <div class="chart-grid-line"></div>
          <div class="chart-grid-line"></div>
          <div class="chart-grid-line"></div>
        </div>
        <div class="chart-bars">
          ${md.chartMonths.map(m => {
            const ih = Math.max(Math.round((m.income / maxVal) * BAR_H), m.income>0?2:0);
            const eh = Math.max(Math.round((m.expense / maxVal) * BAR_H), m.expense>0?2:0);
            return `
              <div class="chart-col">
                <div class="chart-pair">
                  <div class="chart-bar income"  style="height:${ih}px"></div>
                  <div class="chart-bar expense" style="height:${eh}px"></div>
                </div>
                <div class="chart-lbl">${m.label}</div>
              </div>`;
          }).join("")}
        </div>
      </div>
    </div>`;
}

function renderSummaryBody_cat(md) {
  if (!md.catBreakdown.length) return `
    <div class="tx-empty">
      <div class="tx-empty-icon">${SVG.chart}</div>
      ยังไม่มีรายจ่ายเดือนนี้
    </div>`;
  const maxAmt = md.catBreakdown[0].amount;
  return `
    <div class="cat-section">
      <div class="section-title">รายจ่ายแยกหมวดหมู่</div>
      ${md.catBreakdown.map(c => `
        <div class="cat-row">
          <div class="cat-icon-sm" style="background:${c.bg};color:${c.color}">${c.icon}</div>
          <span class="cat-label">${escapeHtml(c.label)}</span>
          <div class="bar-wrap"><div class="bar-fill" style="width:${(c.amount/maxAmt*100).toFixed(1)}%;background:${c.color}55"></div></div>
          <span class="cat-amt">฿${fmt(c.amount)}</span>
        </div>`).join("")}
    </div>`;
}

function renderSummary(md) {
  const subtabs = `
    <div class="subtabs">
      <button class="subtab-btn ${state.summaryTab==="all"?"active":""}"      onclick="setSummaryTab('all')"      title="ภาพรวม">${SVG.grid}<span class="subtab-lbl">ภาพรวม</span></button>
      <button class="subtab-btn ${state.summaryTab==="category"?"active":""}" onclick="setSummaryTab('category')" title="รายจ่ายแยกหมวดหมู่">${SVG.box}<span class="subtab-lbl">หมวดหมู่</span></button>
      <button class="subtab-btn ${state.summaryTab==="chart"?"active":""}"    onclick="setSummaryTab('chart')"    title="รายรับ-รายจ่าย รายเดือน">${SVG.chart}<span class="subtab-lbl">รายเดือน</span></button>
      <button class="subtab-btn ${state.summaryTab==="overview"?"active":""}" onclick="setSummaryTab('overview')" title="ค่าเฉลี่ย">${SVG.wallet}<span class="subtab-lbl">ค่าเฉลี่ย</span></button>
    </div>`;
  let body;
  if (state.summaryTab === "category")      body = renderSummaryBody_cat(md);
  else if (state.summaryTab === "chart")     body = renderSummaryBody_chart(md);
  else if (state.summaryTab === "overview")  body = renderSummaryBody_insights(md);
  else body = renderSummaryBody_cat(md) + renderSummaryBody_chart(md) + renderSummaryBody_insights(md);
  return `${subtabs}${body}`;
}

// ── In-place icon picker ──
function pickNewCatIcon(k) {
  state.newCatIcon = k;
  document.querySelectorAll("[data-icon]").forEach(btn => {
    btn.style.borderColor = btn.getAttribute("data-icon") === k ? "var(--navy)" : "transparent";
  });
}

// ── In-place cat-manage type toggle ──
function setCatManageMode(m) {
  state.sheetMode = m;
  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.toggle("active", btn.classList.contains(m));
  });
  _refreshCatManageList();
}
function setSummaryTab(t) {
  state.summaryTab = t;
  // อัปเดต subtab buttons in-place
  document.querySelectorAll(".subtab-btn").forEach(btn => {
    const tab = btn.getAttribute("onclick").match(/'(\w+)'/)?.[1];
    btn.classList.toggle("active", tab === t);
  });
  // อัปเดตเฉพาะ body ของ summary ไม่ render ทั้งหน้า
  const md = getMonthData();
  const container = document.querySelector(".subtabs");
  if (container && container.nextSibling) {
    // ลบ nodes หลัง subtabs แล้วใส่ body ใหม่
    const parent = container.parentNode;
    while (container.nextSibling) parent.removeChild(container.nextSibling);
    const div = document.createElement("div");
    let body;
    if (t === "category")     body = renderSummaryBody_cat(md);
    else if (t === "chart")   body = renderSummaryBody_chart(md);
    else if (t === "overview")body = renderSummaryBody_insights(md);
    else { body = renderSummaryBody_cat(md) + renderSummaryBody_chart(md) + renderSummaryBody_insights(md); }
    div.innerHTML = body;
    while (div.firstChild) parent.appendChild(div.firstChild);
  } else { render(); }
}

function renderFABs() {
  return `
    <div class="fab-bar">
      <button class="fab expense-fab" onclick="openSheet('expense')">${SVG.minus} รายจ่าย</button>
      <button class="fab income-fab"  onclick="openSheet('income')">${SVG.plus} รายรับ</button>
    </div>`;
}

function renderSheet() {
  const cats = state.sheetMode==="expense" ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
  const catGrid = cats.map(c => renderCatChip(c, state.formCategory === c.key)).join("");

  return `
    <div class="sheet-backdrop" onclick="closeSheet(event)">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <h2>${state.editId ? "แก้ไขรายการ" : "เพิ่มรายการใหม่"}</h2>
          <button class="sheet-close" onclick="closeSheet()">${SVG.close}</button>
        </div>
        <div class="type-toggle">
          <button class="type-btn expense ${state.sheetMode==="expense"?"active":""}" onclick="setMode('expense')">${SVG.minus} รายจ่าย</button>
          <button class="type-btn income  ${state.sheetMode==="income" ?"active":""}" onclick="setMode('income')">${SVG.plus} รายรับ</button>
        </div>
        <div class="amount-field">
          <span class="sym">฿</span>
          <input id="amtInput" type="number" inputmode="decimal" placeholder="0.00"
            value="${state.formAmount}" oninput="state.formAmount=this.value" autofocus />
        </div>
        <div class="field-label" style="display:flex;align-items:center;justify-content:space-between">
          <span>หมวดหมู่</span>
          <button type="button" onclick="openCatManage()" style="display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--navy);font-size:12px;font-family:inherit;cursor:pointer;padding:2px 4px;text-transform:none">${SVG.box} จัดการ</button>
        </div>
        <div class="cat-grid">${catGrid}</div>
        <div class="field-label">วันที่</div>
        <input class="text-field" type="date" value="${state.formDate}" oninput="state.formDate=this.value" />
        <div class="field-label">โน้ต</div>
        <input class="text-field" type="text" placeholder="เช่น กาแฟตอนเช้า"
          value="${escapeHtml(state.formNote)}" oninput="state.formNote=this.value" />
        <button class="save-btn" onclick="saveTransaction()" ${state.saving?"disabled":""}>
          ${state.saving ? "กำลังบันทึก..." : SVG.save + (state.editId ? " บันทึกการแก้ไข" : " บันทึก")}
        </button>
      </div>
    </div>`;
}

function renderStartSheet() {
  return `
    <div class="sheet-backdrop" onclick="closeStartSheet(event)">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <h2>ยอดเงินตั้งต้น</h2>
          <button class="sheet-close" onclick="closeStartSheet()">${SVG.close}</button>
        </div>
        <p class="field-label" style="margin-bottom:14px;line-height:1.8;text-transform:none;font-size:13px;color:var(--soft)">
          ใส่ยอดเงินที่มีอยู่ก่อนเริ่มบันทึก เพื่อคำนวณยอดคงเหลือที่ถูกต้อง
        </p>
        <div class="amount-field">
          <span class="sym">฿</span>
          <input id="startInput" type="number" inputmode="decimal" placeholder="0.00"
            value="${state.startingBalance||""}" autofocus />
        </div>
        <button class="save-btn" onclick="saveStartingBalance(document.getElementById('startInput').value)">
          ${SVG.save} บันทึก
        </button>
      </div>
    </div>`;
}

function renderConfirm() {
  return `
    <div class="sheet-backdrop">
      <div class="confirm-box">
        <h3>ลบรายการนี้?</h3>
        <p>รายการจะถูกลบออกจาก Google Sheet และไม่สามารถกู้คืนได้</p>
        <div class="confirm-btns">
          <button class="btn-cancel" onclick="state.confirmDeleteId=null;this.closest('.sheet-backdrop').remove()">ยกเลิก</button>
          <button class="btn-del"    onclick="deleteTransaction('${state.confirmDeleteId}')">ลบ</button>
        </div>
      </div>
    </div>`;
}

function renderCatManageSheet() {
  const cats = state.sheetMode === "expense" ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
  const list = cats.map(renderCatManageItem).join("");

  const iconPicker = PICKABLE_ICONS.map(k => `
    <button type="button" class="cat-chip" data-icon="${k}" onclick="pickNewCatIcon('${k}')"
      style="width:auto;padding:8px;border:2px solid ${state.newCatIcon===k ? "var(--navy)" : "transparent"}">
      <div class="ci" style="background:#eef3f8;color:#074b90">${SVG[k]}</div>
    </button>`).join("");

  return `
    <div class="sheet-backdrop" onclick="closeCatManage(event)">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <h2>จัดการหมวดหมู่</h2>
          <button class="sheet-close" onclick="closeCatManage()">${SVG.close}</button>
        </div>
        <div class="type-toggle">
          <button class="type-btn expense ${state.sheetMode==="expense"?"active":""}" onclick="setCatManageMode('expense')">${SVG.minus} รายจ่าย</button>
          <button class="type-btn income  ${state.sheetMode==="income" ?"active":""}" onclick="setCatManageMode('income')">${SVG.plus} รายรับ</button>
        </div>
        <div class="field-label">หมวดหมู่ปัจจุบัน</div>
        <div class="cat-manage-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">${list}</div>
        <div class="field-label">เพิ่มหมวดหมู่ใหม่</div>
        <input class="text-field" type="text" placeholder="ชื่อหมวดหมู่ เช่น ค่าเดินทางพิเศษ"
          value="${escapeHtml(state.newCatLabel)}" oninput="state.newCatLabel=this.value" style="margin-bottom:10px" />
        <div class="cat-grid" style="margin-bottom:14px">${iconPicker}</div>
        <button class="save-btn" onclick="addCategoryUI()">${SVG.plus} เพิ่มหมวดหมู่</button>
      </div>
    </div>`;
}

function openCatManage() {
  state.catManageOpen = true;
  state.newCatLabel = "";
  // append เข้า modal-root โดยตรง ไม่ replace innerHTML ทั้งหมด (ป้องกัน sheet กระพริบ)
  const root = document.getElementById("modal-root");
  const tmp = document.createElement("div");
  tmp.innerHTML = renderCatManageSheet();
  root.appendChild(tmp.firstElementChild);
}
function closeCatManage(e) {
  if (!e || e.target.classList.contains("sheet-backdrop")) {
    state.catManageOpen = false;
    // ลบเฉพาะ cat-manage backdrop (อันสุดท้าย) ไม่ replace ทั้ง modal-root
    const backdrops = document.querySelectorAll("#modal-root > .sheet-backdrop");
    if (backdrops.length > 0) backdrops[backdrops.length - 1].remove();
    // อัปเดต cat-grid ใน transaction sheet แบบ in-place แทนการเรียก render()
    refreshCatGrid();
  }
}

async function persistCategories() {
  const payload = {
    expense: EXPENSE_CATEGORIES.map(({icon, ...c}) => c),
    income:  INCOME_CATEGORIES.map(({icon, ...c}) => c),
  };
  try {
    const res = await gasCall("saveCategories", payload);
    if (!res.ok) showToast("บันทึกหมวดหมู่ไม่สำเร็จ: " + res.error);
  } catch (e) { showToast("บันทึกหมวดหมู่ไม่สำเร็จ"); }
}

function _refreshCatManageList() {
  const cats = state.sheetMode === "expense" ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
  const listEl = document.querySelector(".cat-manage-list");
  if (listEl) listEl.innerHTML = cats.map(renderCatManageItem).join("");
}

function addCategoryUI() {
  const label = state.newCatLabel.trim();
  if (!label) { showToast("กรุณาใส่ชื่อหมวดหมู่"); return; }
  const usedColors = new Set(allCats().map(c => c.color));
  let preset = COLOR_PRESETS[state.catColorSeq % COLOR_PRESETS.length];
  for (let i = 0; i < COLOR_PRESETS.length && usedColors.has(preset.color); i++) {
    state.catColorSeq++;
    preset = COLOR_PRESETS[state.catColorSeq % COLOR_PRESETS.length];
  }
  state.catColorSeq++;
  const newCat = {
    key: generateId(), label,
    iconKey: state.newCatIcon || "box",
    bg: preset.bg, color: preset.color,
  };
  newCat.icon = SVG[newCat.iconKey] || SVG.other;
  if (state.sheetMode === "expense") EXPENSE_CATEGORIES.push(newCat);
  else INCOME_CATEGORIES.push(newCat);
  state.newCatLabel = "";
  persistCategories();
  _refreshCatManageList();
  const inp = document.querySelector(".cat-manage-list")?.closest(".sheet")?.querySelector('input.text-field[type="text"]');
  if (inp) inp.value = "";
  showToast("✓ เพิ่มหมวดหมู่แล้ว");
}

function removeCategoryUI(key, btn) {
  const list = state.sheetMode === "expense" ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;
  if (list.length <= 1) { showToast("ต้องมีอย่างน้อย 1 หมวดหมู่"); return; }
  const idx = list.findIndex(c => c.key === key);
  if (idx === -1) return;
  const row = btn ? btn.closest(".cat-chip") : null;
  const doRemove = () => {
    list.splice(idx, 1);
    if (state.formCategory === key) state.formCategory = list[0].key;
    persistCategories();
    _refreshCatManageList();
    showToast("ลบหมวดหมู่แล้ว");
  };
  if (row) {
    row.style.pointerEvents = "none";
    row.style.transition = "opacity .15s, transform .15s";
    row.style.opacity = "0";
    row.style.transform = "scale(.95)";
    setTimeout(doRemove, 150);
  } else {
    doRemove();
  }
}

function openSheet(mode)    {
  state.editId = null;
  state.sheetMode = mode || "expense";
  state.formCategory = (mode === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES)[0].key;
  state.formAmount = ""; state.formNote = ""; state.formDate = todayISO();
  state.sheetOpen = true;
  renderModals();
  setTimeout(() => { const i = document.getElementById("amtInput"); if (i) i.focus(); }, 100);
}
function openEditSheet(id) {
  const t = state.transactions.find(x => x.id === id);
  if (!t) return;
  state.editId = id;
  state.sheetMode = t.type;
  state.formCategory = catInfo(t.category).key;
  state.formAmount = String(t.amount);
  state.formNote = t.note || "";
  state.formDate = t.date;
  state.sheetOpen = true;
  renderModals();
  setTimeout(() => { const i = document.getElementById("amtInput"); if (i) i.focus(); }, 100);
}
function closeSheet(e) {
  if (!e || e.target.classList.contains("sheet-backdrop")) {
    state.sheetOpen = false;
    state.editId = null;
    const el = document.querySelector("#modal-root > .sheet-backdrop");
    if (el) el.remove();
  }
}

function openStartSheet()   { state.startSheetOpen = true;  renderModals(); }
function closeStartSheet(e) {
  if (!e || e.target.classList.contains("sheet-backdrop")) {
    state.startSheetOpen = false;
    const el = document.querySelector("#modal-root > .sheet-backdrop");
    if (el) el.remove();
  }
}
function setMode(m) {
  state.sheetMode = m;
  state.formCategory = (m === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES)[0].key;

  // ── patch type-toggle buttons (no re-render) ──
  document.querySelectorAll(".type-btn").forEach(btn => {
    btn.classList.toggle("active", btn.classList.contains(m));
  });

  // ── swap category grid in-place ──
  refreshCatGrid();
}

function selectCat(k) {
  state.formCategory = k;
  document.querySelectorAll(".cat-chip").forEach(el => {
    const key = el.getAttribute("data-key");
    el.classList.toggle("selected", key === k);
  });
}
function changeMonth(d)     { state.monthOffset+=d; render(); }
function setView(v)         { state.view=v; render(); }
function askDelete(id) {
  state.confirmDeleteId = id;
  const root = document.getElementById("modal-root");
  const tmp = document.createElement("div");
  tmp.innerHTML = renderConfirm();
  root.appendChild(tmp.firstElementChild);
}

window.addEventListener("DOMContentLoaded", loadData);

// ── Refresh ข้อมูลอัตโนมัติเมื่อกลับมาเปิดแท็บ ──
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible" || state.loading) return;
  const anySheetOpen = state.sheetOpen || state.startSheetOpen || state.catManageOpen || state.confirmDeleteId;
  if (anySheetOpen) return; // มีฟอร์ม/sheet เปิดอยู่ ไม่ refresh ทับข้อมูลที่กำลังกรอก
  loadData();
});
</script>
</body>
</html>
